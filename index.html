<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Copa del Mundo 2026</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="fondo_oxxo" src="escenario_principal.jpg">
        <audio id="sound_cafe" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" preload="auto"></audio>
        <audio id="sound_gol" src="https://actions.google.com/sounds/v1/sports/crowd_cheer.ogg" preload="auto"></audio>
      </a-assets>

      <a-sky src="#fondo_oxxo" rotation="0 -90 0"></a-sky>

      <a-entity sound="src: #sound_cafe; autoplay: true; loop: true; volume: 0.3; rolloffFactor: 5" position="-1 1.2 -1"></a-entity>

      <a-entity id="vaso_interactivo" 
                class="interactuable" 
                position="0 1.05 0.5"
                animation="property: position; to: 0 1.12 0.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
                sound="src: #sound_gol; on: mouseenter; volume: 1">
        
        <a-cone radius-bottom="0.04" radius-top="0.06" height="0.15" 
                material="color: #FFF; opacity: 0.6; transparent: true; roughness: 0; metalness: 0.5">
        </a-cone>
        
        <a-cylinder radius="0.045" height="0.02" position="0 -0.07 0" 
                    material="color: #FFD700; metalness: 1; roughness: 0.1"
                    animation="property: material.color; from: #FFD700; to: #FFF; dir: alternate; dur: 1000; loop: true">
        </a-cylinder>

        <a-text value="andatti\nGOURMET" align="center" position="0 0 0.06" 
                color="#FFD700" width="0.4" font="msdf"></a-text>
      </a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" intensity="1" position="1 3 1" color="#FFD700"></a-light>

      <a-entity id="rig" position="0 0 1.5">
        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: true; fuseTimeout: 500"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                      material="color: #FFD700; shader: flat"
                      raycaster="objects: .interactuable">
            </a-entity>
        </a-entity>
        
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
