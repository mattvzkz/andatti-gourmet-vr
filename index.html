<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Edición Copa del Mundo 2026</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #btn-entrar {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        padding: 25px 60px; background: #FFD700; color: #000;
        font-family: 'Arial Black', sans-serif; font-weight: bold; font-size: 22px;
        border: 4px solid #000; border-radius: 10px; cursor: pointer; z-index: 100000;
      }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a1a1a; z-index: 99999;
      }
    </style>
  </head>
  <body>

    <div id="overlay"></div>
    <button id="btn-entrar">INICIAR EXPERIENCIA (CON AUDIO)</button>

    <a-scene>
      <a-assets>
        <img id="fondo_oxxo" src="escenario_principal.jpg">
        <audio id="audio_fondo" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" crossorigin="anonymous"></audio>
        <audio id="audio_interaccion" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" crossorigin="anonymous"></audio>
      </a-assets>

      <a-sky src="#fondo_oxxo" rotation="0 -90 0"></a-sky>

      <a-entity id="ambient-loop" sound="src: #audio_fondo; loop: true; volume: 0.5; autoplay: false"></a-entity>

      <a-entity id="vaso_contenedor" class="interactuable" position="0 1.1 -1.5"
                geometry="primitive: cylinder; radius: 0.2; height: 0.5"
                material="opacity: 0; transparent: true"
                animation="property: position; to: 0 1.15 -1.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
                sound="src: #audio_interaccion; on: click; volume: 1">
        
        <a-cone radius-bottom="0.07" radius-top="0.1" height="0.25" material="color: #FFF; opacity: 0.7; transparent: true; metalness: 0.5"></a-cone>
        <a-cylinder radius="0.075" height="0.04" position="0 -0.13 0" material="color: #FFD700; metalness: 1"></a-cylinder>
        <a-text value="andatti\nGOURMET" align="center" position="0 0 0.11" color="#FFD700" width="0.8"></a-text>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-entity camera look-controls position="0 1.6 0">
          <a-entity cursor="fuse: true; fuseTimeout: 1000"
                    raycaster="objects: .interactuable"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                    material="color: #FFD700; shader: flat">
          </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.getElementById('btn-entrar');
      const overlay = document.getElementById('overlay');
      const ambientEntity = document.querySelector('#ambient-loop');

      btn.addEventListener('click', function() {
        btn.style.display = 'none';
        overlay.style.display = 'none';

        // ACCIÓN CLAVE: El componente 'sound' de A-Frame necesita ser activado manualmente
        // Esto "despierta" el motor de audio de la escena
        ambientEntity.components.sound.playSound();
        console.log("Intentando sonar...");
      });
    </script>
  </body>
</html>
