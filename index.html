<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Final</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #btn-entrar {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        padding: 25px 60px; background: #FFD700; color: #000;
        font-family: sans-serif; font-weight: bold; font-size: 24px;
        border: none; border-radius: 10px; cursor: pointer; z-index: 100000;
      }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 99999;
      }
    </style>
  </head>
  <body>

    <div id="overlay"></div>
    <button id="btn-entrar">ACTIVAR EXPERIENCIA</button>

    <a-scene>
      <a-assets>
        <img id="fondo_oxxo" src="escenario_principal.jpg">
      </a-assets>

      <a-sky src="#fondo_oxxo" rotation="0 -90 0"></a-sky>

      <a-entity id="escena-sonido" 
                sound="src: url(https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav); loop: true; volume: 0.6">
      </a-entity>

      <a-entity id="vaso_contenedor" class="interactuable" position="0 1.1 -1.5"
                geometry="primitive: cylinder; radius: 0.2; height: 0.5"
                material="opacity: 0; transparent: true"
                sound="src: url(https://actions.google.com/sounds/v1/sports/crowd_cheer.ogg); on: click; volume: 1">
        
        <a-cone radius-bottom="0.07" radius-top="0.1" height="0.25" material="color: #FFF; opacity: 0.8; metalness: 0.5"></a-cone>
        <a-cylinder radius="0.075" height="0.04" position="0 -0.13 0" material="color: #FFD700; metalness: 1"></a-cylinder>
        <a-text value="andatti\nGOURMET" align="center" position="0 0 0.11" color="#FFD700" width="0.8"></a-text>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-entity camera look-controls position="0 1.6 0">
          <a-entity cursor="fuse: true; fuseTimeout: 1000"
                    raycaster="objects: .interactuable"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                    material="color: #FFD700; shader: flat">
          </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#btn-entrar');
      const overlay = document.querySelector('#overlay');
      const escena = document.querySelector('#escena-sonido');

      btn.addEventListener('click', function() {
        // 1. Quitar la pantalla
        btn.style.display = 'none';
        overlay.style.display = 'none';

        // 2. Forzar al motor de A-Frame a sonar
        if (escena.components.sound) {
            escena.components.sound.playSound();
        }
      });
    </script>
  </body>
</html>
