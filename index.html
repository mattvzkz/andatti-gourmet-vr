<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Edición Copa del Mundo</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <div style="position: fixed; top: 10px; left: 10px; z-index: 999; color: white; font-family: sans-serif; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; border: 1px solid #FFD700;">
      Haz CLIC en la pantalla para activar el audio 🔊
    </div>

    <a-scene>
      <a-assets>
        <img id="fondo_oxxo" src="escenario_principal.jpg">
        <audio id="sound_cafe" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" preload="auto"></audio>
        <audio id="sound_gol" src="https://actions.google.com/sounds/v1/sports/crowd_cheer.ogg" preload="auto"></audio>
      </a-assets>

      <a-sky src="#fondo_oxxo" rotation="0 -90 0"></a-sky>

      <a-entity sound="src: #sound_cafe; autoplay: true; loop: true; volume: 0.3" position="-1 1.2 -1"></a-entity>

      <a-entity id="vaso_interactivo" 
                class="interactuable" 
                position="0 1.05 0.5"
                animation="property: position; to: 0 1.15 0.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
                sound="src: #sound_gol; on: click; volume: 1">
        
        <a-cone radius-bottom="0.06" radius-top="0.09" height="0.22" 
                material="color: #FFF; opacity: 0.6; transparent: true; roughness: 0; metalness: 0.5">
        </a-cone>
        
        <a-cylinder radius="0.065" height="0.03" position="0 -0.11 0" 
                    material="color: #FFD700; metalness: 1; roughness: 0.1"
                    animation="property: material.color; from: #FFD700; to: #FFF; dir: alternate; dur: 1000; loop: true">
        </a-cylinder>
