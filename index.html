<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Copa del Mundo 2026</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="fondo_oxxo" src="escenario_principal.jpg">
        </a-assets>

      <a-sky src="#fondo_oxxo" rotation="0 -90 0"></a-sky>

      <a-plane position="0 0.01 0" rotation="-90 0 0" width="20" height="20" color="#000" opacity="0.2"></a-plane>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" intensity="0.6" position="-1 3 1" color="#FFD700"></a-light>

      <a-entity id="rig" position="0 0 1.8">
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

      <a-cylinder position="0 1.05 -0.5" radius="0.05" height="0.15" color="#FFD700" metalness="1" roughness="0.1">
        <a-text value="VASO" align="center" position="0 0.2 0" color="#FFF" scale="0.5 0.5 0.5"></a-text>
      </a-cylinder>

    </a-scene>
  </body>
</html>
