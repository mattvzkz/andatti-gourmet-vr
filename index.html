<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Edición Copa del Mundo 2026</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
  </head>
  <body>
    <div id="welcome-screen" onclick="entrarAlOxxo()" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #FFD700; font-family: Arial, sans-serif; cursor: pointer;">
      <h1 style="font-size: 3em; margin: 0; text-align: center;">andatti GOURMET</h1>
      <p style="color: #fff; font-size: 1.2em; letter-spacing: 2px;">EXPERIENCIA MUNDIALISTA 2026</p>
      <div style="margin-top: 30px; padding: 15px 40px; border: 3px solid #FFD700; font-weight: bold; background: #FFD700; color: #000; border-radius: 50px;">ENTRAR Y PREPARAR CAFÉ</div>
      <p style="color: #666; margin-top: 20px; font-size: 0.8em;">(Si no avanza, haz clic varias veces)</p>
    </div>

    <a-scene>
      <a-assets>
        <img id="fondo_oxxo" src="escenario_principal.jpg">
        <audio id="sound_cafeteria" src="https://assets.mixkit.co/sfx/preview/mixkit-coffee-shop-ambience-426.mp3" preload="auto"></audio>
        <audio id="sound_gol" src="https://assets.mixkit.co/sfx/preview/mixkit-stadium-crowd-light-applause-492.mp3" preload="auto"></audio>
      </a-assets>

      <a-sky src="#fondo_oxxo" rotation="0 -90 0"></a-sky>

      <a-entity id="vaso_contenedor" 
                class="interactuable"
                position="0 1.1 -1.5"
                geometry="primitive: cylinder; radius: 0.15; height: 0.4"
                material="opacity: 0; transparent: true"
                animation="property: position; to: 0 1.15 -1.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        
        <a-cone radius-bottom="0.07" radius-top="0.1" height="0.25" material="color: #FFF; opacity: 0.7; transparent: true; metalness: 0.5"></a-cone>
        <a-cylinder radius="0.075" height="0.04" position="0 -0.13 0" material="color: #FFD700; metalness: 1"></a-cylinder>
        <a-text value="andatti\nGOURMET" align="center" position="0 0 0.11" color="#FFD700" width="0.8"></a-text>

        <a-entity position="0 0.15 0"
                  particle-system="preset: dust; color: #FFFFFF; particleCount: 30; size: 0.2; velocityValue: 0 0.1 0; opacity: 0.2">
        </a-entity>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="point" intensity="1.2" position="0 2.5 -1" color="#FFD700"></a-light>

      <a-entity camera look-controls position="0 1.6 0">
          <a-entity cursor="fuse: true; fuseTimeout: 1000"
                    raycaster="objects: .interactuable"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                    material="color: #FFD700; shader: flat"
                    animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1000; startEvents: fusing"
                    animation__reset="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
          </a-entity>
      </a-entity>
    </a-scene>

    <script>
      // FUNCIÓN MAESTRA DE ENTRADA
      function entrarAlOxxo() {
        const screen = document.getElementById('welcome-screen');
        const audioCafe = document.querySelector('#sound_cafeteria');
        const audioGol = document.querySelector('#sound_gol');

        // Quitamos la pantalla inmediatamente
        screen.style.display = 'none';

        // Activamos audios
        if(audioCafe) {
          audioCafe.loop = true;
          audioCafe.volume = 0.3;
          audioCafe.play().catch(e => console.log("Audio cafe en espera"));
        }
        
        if(audioGol) {
          audioGol.play().then(() => { audioGol.pause(); audioGol.currentTime = 0; }).catch(e => {});
        }
      }

      // Listener para el clic en el vaso (Grito de Gol)
      document.querySelector('#vaso_contenedor').addEventListener('click', function () {
        const audioGol = document.querySelector('#sound_gol');
        if(audioGol) {
          audioGol.volume = 0.9;
          audioGol.play();
        }
      });
    </script>
  </body>
</html>
