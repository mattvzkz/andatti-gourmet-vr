<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>andatti Gourmet VR | Copa del Mundo 2026</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: forest; lighting: point; groundColor: #1a1a1a; skyType: gradient; skyColor: #000000"></a-entity>

      <a-entity text="value: Bienvenido a andatti Gourmet VR; align: center; color: #FFD700" position="0 2.5 -2" scale="3 3 3"></a-entity>
      <a-entity text="value: Copa del Mundo 2026; align: center; color: #FFFFFF" position="0 2.2 -2" scale="2 2 2"></a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="point" intensity="1" position="2 4 4"></a-light>

      <a-entity camera look-controls position="0 1.6 0"></a-entity>
      <a-entity oculus-touch-controls="hand: left"></a-entity>
      <a-entity oculus-touch-controls="hand: right"></a-entity>
    </a-scene>
  </body>
</html>
